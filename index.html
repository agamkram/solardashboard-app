<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0c10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Solar Dashboard">
  <meta name="description" content="UV, irradiance, air quality, pollen, and sun exposure for your location.">
  <title>Solar Dashboard</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="styles.css?v=pad5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=IBM+Plex+Mono:wght@500;600&family=Michroma&display=swap" rel="stylesheet">
</head>
<body>
  <div class="fit-stage" id="fit-stage">
  <div class="app" id="app">
    <header class="app-header">
      <h1 class="app-title">SolarDashboard</h1>
    </header>
    <div class="loc">
      <button type="button" id="locate-btn" title="My location" aria-label="My location">◎</button>
      <div class="place" id="location-text">Detecting location…</div>
      <button type="button" class="edit" id="manual-location-btn">Edit</button>
    </div>

    <div class="band">
      <div class="band-label">Conditions</div>
      <div class="grid conds">
        <button type="button" class="cell" data-tip="uv" aria-expanded="false">
          <span class="k">UV index</span>
          <span class="v uv" id="c-uv">—</span>
          <span class="s" id="c-uv-s">—</span>
        </button>
        <button type="button" class="cell" data-tip="uva" aria-expanded="false">
          <span class="k">UVA</span>
          <span class="v" id="c-uva">—</span>
          <span class="s">estimate</span>
        </button>
        <button type="button" class="cell" data-tip="uvb" aria-expanded="false">
          <span class="k">UVB</span>
          <span class="v" id="c-uvb">—</span>
          <span class="s">estimate</span>
        </button>
        <button type="button" class="cell" data-tip="cloud" aria-expanded="false">
          <span class="k">Cloud cover</span>
          <span class="v" id="c-cloud">—</span>
          <span class="s" id="c-csf">csf —</span>
        </button>
        <button type="button" class="cell" data-tip="toa" aria-expanded="false">
          <span class="k">Irradiance</span>
          <span class="v" id="c-toa">—</span>
          <span class="s">top of atmosphere</span>
        </button>
        <button type="button" class="cell" data-tip="clear" aria-expanded="false">
          <span class="k">Irradiance</span>
          <span class="v" id="c-clear">—</span>
          <span class="s">ground · ideal</span>
        </button>
        <button type="button" class="cell" data-tip="ground" aria-expanded="false">
          <span class="k">Irradiance</span>
          <span class="v" id="c-ground">—</span>
          <span class="s">at your feet</span>
        </button>
        <button type="button" class="cell" data-tip="pct" aria-expanded="false">
          <span class="k">Ground sunlight</span>
          <span class="v" id="c-pct">—</span>
          <span class="s">of solar noon</span>
        </button>
        <button type="button" class="cell" data-tip="aqi" aria-expanded="false">
          <span class="k">Air quality index</span>
          <span class="v" id="c-aqi">—</span>
          <span class="s" id="c-aqi-s">—</span>
        </button>
        <button type="button" class="cell" data-tip="pollen" aria-expanded="false">
          <span class="k">Pollen</span>
          <span class="v" id="c-pollen">—</span>
          <span class="s" id="c-pollen-s">—</span>
        </button>
        <button type="button" class="cell" data-tip="sunel" aria-expanded="false">
          <span class="k">Sun elevation</span>
          <span class="v" id="c-sunel">—</span>
          <span class="s" id="c-sunaz">az —</span>
        </button>
        <button type="button" class="cell" data-tip="maxel" aria-expanded="false">
          <span class="k">Max elevation</span>
          <span class="v" id="c-maxel">—</span>
          <span class="s">solar noon</span>
        </button>
      </div>
    </div>

    <div class="sky-block">
      <section class="sky-panel" aria-label="Sun position visualization">
        <canvas id="sky-canvas"></canvas>
      </section>
      <div class="controls">
        <div class="time-row">
          <time id="current-time" class="current-time">—</time>
          <button type="button" id="now-btn" class="now-btn" title="Jump to current time">Now</button>
        </div>
        <div class="slider-wrap">
          <div class="slider-top">
            <span id="noon-label">Solar Noon —</span>
          </div>
          <label for="time-slider" class="visually-hidden">Time of day</label>
          <div class="slider-track" id="slider-track">
            <input type="range" id="time-slider" min="0" max="1000" value="500" step="1">
            <span class="noon-dot" title="Solar noon" aria-hidden="true"></span>
          </div>
          <div class="slider-labels">
            <span id="sunrise-label">Sunrise —</span>
            <span class="day-length" id="day-length">Day length —</span>
            <span id="sunset-label">Sunset —</span>
          </div>
        </div>
      </div>
    </div>

    <div class="band">
      <div class="band-label">Skin & exposure</div>
      <div class="grid health">
        <button type="button" class="cell" data-tip="burn" aria-expanded="false">
          <span class="k">Time to burn</span>
          <span class="v hot" id="h-burn">—</span>
          <span class="s" id="h-burn-s">—</span>
        </button>
        <button type="button" class="cell" data-tip="vitd" aria-expanded="false">
          <span class="k">Vit D rate</span>
          <span class="v" id="h-vitd">—</span>
          <span class="s">full body</span>
        </button>
        <button type="button" class="cell" data-tip="dose" aria-expanded="false">
          <span class="k">Useful dose</span>
          <span class="v" id="h-dose">—</span>
          <span class="s">to ~1000 IU</span>
        </button>
        <button type="button" class="cell" data-tip="kp" aria-expanded="false">
          <span class="k">Kp index</span>
          <span class="v" id="h-kp">—</span>
          <span class="s" id="h-kp-s">geomagnetic</span>
        </button>
        <button type="button" class="cell" data-tip="risk" aria-expanded="false">
          <span class="k">Burn risk</span>
          <span class="v" id="h-risk">—</span>
          <span class="s" id="h-risk-s">—</span>
        </button>
        <button type="button" class="cell" data-tip="altf" aria-expanded="false">
          <span class="k">Altitude factor</span>
          <span class="v" id="h-altf">—</span>
          <span class="s" id="h-altf-s">—</span>
        </button>
        <button type="button" class="cell" data-tip="moonlight" aria-expanded="false">
          <span class="k">Moonlight</span>
          <span class="v moon" id="h-moon">—</span>
          <span class="s" id="h-moon-s">—</span>
        </button>
        <button type="button" class="cell" data-tip="moonel" aria-expanded="false">
          <span class="k">Moon elevation</span>
          <span class="v moon" id="c-moonel">—</span>
          <span class="s" id="c-moonph">—</span>
        </button>
      </div>
    </div>

    <div class="skin-bar" data-tip="skin" aria-expanded="false">
      <div class="lbl">Skin type · Fitzpatrick</div>
      <div class="skin-slider-col">
        <div class="skin-scale" aria-hidden="true">
          <span>I</span><span>II</span><span>III</span><span>IV</span><span>V</span><span>VI</span>
        </div>
        <input type="range" id="skin-slider" min="1" max="6" value="3" aria-label="Skin type">
        <div class="skin-swatches" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </div>
  </div>

  <dialog id="location-dialog" class="location-dialog">
    <form method="dialog" id="location-form">
      <h2>Set your location</h2>
      <p class="map-hint">Tap or click the map to place a pin</p>
      <div id="location-map" class="location-map" role="application" aria-label="Location map"></div>
      <p id="map-coords" class="map-coords">—</p>
      <input type="hidden" id="lat-input">
      <input type="hidden" id="lon-input">
      <div class="dialog-actions">
        <button type="button" id="cancel-location" class="secondary-btn">Cancel</button>
        <button type="submit" class="primary-btn">Apply</button>
      </div>
    </form>
  </dialog>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="solar.js"></script>
  <script src="moon.js"></script>
  <script src="api.js"></script>
  <script src="app.js?v=pad1"></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
